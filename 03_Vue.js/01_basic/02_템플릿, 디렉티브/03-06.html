<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vue 3 연습용 Options API</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  </head>
  <body>
    <div id="app">
      위의 내용에 동의하십니까?
      <input type="checkbox" v-model="agree" true-value="동의" false-value="비동의" />
      <hr />
      <span>선택된 값 : {{agree}}</span>
    </div>
    <script>
      let vm = Vue.createApp({
        name: 'App',
        data() {
          return {
            agree: '비동의',
          };
        },
      }).mount('#app');
    </script>
  </body>
</html>
