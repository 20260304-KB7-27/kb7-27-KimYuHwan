<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vue 3 연습용 Composition</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  </head>
  <body>
    <div id="app">
      <div>
        <h2>취미생활</h2>
        <label> 운동 </label> <input type="checkbox" value="A" v-model="hobby" />
        <label> 독서 </label> <input type="checkbox" value="B" v-model="hobby" />
        <label> 음악 </label> <input type="checkbox" value="C" v-model="hobby" />
        <label> 댄스 </label> <input type="checkbox" value="D" v-model="hobby" />
        <label> 역사 </label> <input type="checkbox" value="E" v-model="hobby" />
      </div>

      <div>
        <h2>상품 분류 선택</h2>
        <select v-model="category">
          <option value="">----상품 분류를 선택하세요.</option>
          <option value="레저">레저</option>
          <option value="가전">가전</option>
          <option value="음식">음식</option>
          <option value="도서">도서</option>
          <option value="주방">주방</option>
        </select>
      </div>

      <hr />

      <div>
        선택한 취미: {{ hobby.join(', ') }} <br />
        선택한 상품 분류: {{ category }}
      </div>
    </div>

    <script>
      // Vue 인스턴스 생성 및 데이터 정의
      const { createApp } = Vue;

      createApp({
        data() {
          return {
            // 체크박스(다중 선택)는 반드시 빈 배열([])로 초기화해야 합니다.
            hobby: [],
            // 셀렉트 박스(단일 선택)는 빈 문자열('')로 초기화합니다.
            category: '',
          };
        },
      }).mount('#app');
    </script>
  </body>
</html>
