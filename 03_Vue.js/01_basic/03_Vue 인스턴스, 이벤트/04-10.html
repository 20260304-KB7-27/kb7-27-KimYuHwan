<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vue 3 연습용 Options API</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  </head>
  <body>
    <div id="app">
      1보다 큰 수 :
      <input type="text" v-model.number="num" /><br />
      1부터 입력한 값까지의 합 : <span>{{ sum }}</span>
    </div>

    <script>
      const { createApp } = Vue;

      createApp({
        data() {
          return { num: 0 };
        },
        computed: {
          sum() {
            const n = parseInt(this.num, 10);
            if (Number.isNaN(n) || n < 2) return "";
            return (n * (n + 1)) / 2;
          },
        },
        created() {
          console.log("## created");
        },
        mounted() {
          console.log("## mounted");
        },
        updated() {
          console.log("## updated");
        },
      }).mount("#app");
    </script>
  </body>
</html>
