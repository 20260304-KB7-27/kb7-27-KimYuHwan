<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Script스니펫</title>
    <script>
      window.onload = function () {
        // 요소찾기
        const clock = document.getElementById('clock');
// this
// 객체에서 this -> 그 객체 
// 이벤트핸들러 -> 이벤트가 발생한 요소를 가르킨다
// setinterval( 일반함수) -> 일반함수 같은 경우에는 window 라는 객체가 나온다.
        setInterval(function () {
          let now = new Date();
          console.log(now);
          clock.innerHTML = now.toString();
        }, 1000);
      };
    </script>
  </head>

  <body>
    <h1 id="clock"></h1>
  </body>
</html>
