<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Script스니펫</title>
    <script>
      window.onload = function () {
        let output = '';
        for (let i = 0; i < 10; i++) {
          output += '<h1>Header - ' + i + '</h1>';
        }
        document.body.innerText = output;
        document.body.innerHTML = output;
      };
      // innerHTML은 바로 위에서 들어간 텍스트를 지워버리고, output 문자열을 HTML로 해석해서 다시 채움.
      // innterText는 그냥 텍스트로 인식.(HTML로 인식하지 않음)
    </script>
  </head>

  <body>
    <div></div>
  </body>
</html>
