<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      // 변수를 선언합니다.
      let sum = 0;
      for (let i = 0; i <= 100; i++) {
        sum = sum + i;
      }
      alert(sum);
      // 탈출하려고 변수를 더합니다.
    </script>
  </head>

  <body></body>
</html>
