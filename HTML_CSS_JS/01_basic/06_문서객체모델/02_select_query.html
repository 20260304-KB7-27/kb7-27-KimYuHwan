<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Script스니펫</title>
    <script>
      window.onload = function () {
        //querySelectorAll
        //주어진 CSS 선택자에 일치하는 모든 요소를 선택
        const headers = document.querySelectorAll('h1');
        const header = document.querySelectorAll('h1')[0];
        header.innerText = 'From JavaScript';
        header.style.color = 'orange';
        header.style.backgroundColor = 'red';

        console.log(headers);
      };
    </script>
  </head>

  <body>
    <h1>Header</h1>
    <h1>Header</h1>
    <h1>Header</h1>
    <div></div>
  </body>
</html>
