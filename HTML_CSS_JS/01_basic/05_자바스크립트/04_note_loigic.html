    <script>
      let date = new Date();
      // 요소를 추출합니다.
      let year = date.getFullYear();
      let month = date.getMonth() + 1;
      let day = date.getDay();
      let hours = date.getHours();
      let minutes = date.getMinutes();
      let seconds = date.getSeconds();
      if (month == 1 || month == 2 || month == 12) {
        alert('겨울입니다');
      } else if (3 <= month < 6) {
        alert('봄입니다');
      } else if (6 <= month < 9) {
        alert('여름입니다');
      } else if (9 <= month < 12) {
        alert('가을입니다');
      }
