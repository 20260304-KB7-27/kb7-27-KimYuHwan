<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .container {
        width: 100%;
        border: 1px solid #ccc;
        padding: 10px;
        margin-bottom: 20px;
      }

      .box {
        width: 200px;
        height: 100px;
        background-color: white;
        border: 1px solid black;
        padding: 10px;
        margin: 5px;
        float: left;
      }
      .problem-1 {
        background-color: pink;
      }
      .problem-2 {
        background-color: skyblue;
      }
      /* clearfix */

      .clearfix::after {
        content: '';
        display: block;
        clear: both;
        height: 0;
        visibility: hidden;
      }
    </style>
  </head>
  <body>
    <h2>1. 부모 요소 높이 붕괴 문제</h2>
    <div class="container problem-1 clearfix">
      <div class="box">Float 요소 1</div>
      <div class="box">Float 요소 2</div>
      <div class="box">Float 요소 3</div>
    </div>
    <hr />

</html>
