스크립트 요소 위치에 따라 동작들이 달라짐.body부분에 써야 꼬일일이 적다. -->
<!-- 1. head에 작성할 경우
- html 파싱이 되던 중 스크립트를 먼저 실행
-> DOM 요소가 생성되기 전에 실행되어 DOM 요소 조작시 문제가 생길수 있음
=> 따라서 주로 전역 설정이나 유틸리티 함수에 사용
2. body에 작성할 경우
- HTML이 전부 파싱된 후 스크립트 실행
-> DOM요소에 안전하게 접근가능
=
