<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      h1 {
        background-color: orange;
        color: red !;
      }
    </style>
    <!-- 
    CSS
    -HTML 문서의 스타일을 정의하는 스타일 시트 언어
    - 캐스케이딩, 상속, 재사용성

    1. 외부 스타일 시트(.css)
    -  별도의 .css 파일을 생성해 HTML 문서와 연결
    2. 내부 스타일 시트
    - HTML 문서 내 head 태그 안에 style 태그를 사용하여 css 정의
    3. 인라인 스타일
    - HTML 요소에 style 속성에 직접 스타일 적용

    선택자
    - css에서 스타일을 적용할 HTML요소를 선택하는 방법
    태그/ ID/ Class / 전체(*) / 속성

    우선순위
    1. !important 
    2. 인라인 스타일
    3. 아이디 선택자
    4. 클래스 선택자
    5. 태그 선택자
    6. 전체 선택자
    7. 상속된 스타일
    -->
  </head>
  <body>
    <div>
      <h1 style="color: blue">CSS선택자 기본</h1>
    </div>
  </body>
</html>
