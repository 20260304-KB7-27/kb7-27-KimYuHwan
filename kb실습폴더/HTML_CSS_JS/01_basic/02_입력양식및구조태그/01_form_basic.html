<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <form action="">
      <table>
        <tr>
          <td><label for="">이름</label></td>
          <td><input type="text" /></td>
        </tr>
        <tr>
            <td>성별</label>
            <input type="radio" />
                <label for="">남자</label>
                <input type="radio" />

            </td>

      </table>

<!-- 
form태그 : 사용자로부터 입력을 받기위한 양식을 만드는 태그
action: 폼데이터를 전송할 서버의 URL
method: 데이터 전송 방식( GET/ POST)
-->

<!-- 
input 태그 
name 속성 : 서버로 전송될 때 사용되는 이름
id 속성 : html 요소의 고유식별자
type: 입력 필드의 종류
 
-->
