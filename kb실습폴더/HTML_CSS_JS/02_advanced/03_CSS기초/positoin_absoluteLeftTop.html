<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      /* 
        nth-child : 가상 클래스 선택자
        - 특정 순서의 자식 요소를 선택
        */
      .box {
        width: 100px;
        height: 100px;
        position: absolute;
      }
      .box:nth-child(1) {
        background-color: red;
        left: 0px;
        top: 0px;
      }
      .box:nth-child(2) {
        background-color: green;
        left: 50px;
        top: 50px;
      }
      .box:nth-child(3) {
        background-color: blue;
        left: 100px;
        top: 100px;
      }
      .parent {
        width: 300px;
        height: 300px;
        background-color: firebrick;
        position: relative;
      }
    </style>
  </head>
  <!-- 
  absolute의 경우
  부모요소들 중에 position이 지정이 되어있을 경우 해당 부모를 기준으로 
  top, right, bottom, left 속성을 사용하여 위치를 지정
  -->
  <body>
    <h1>테스트</h1>
    <div class="parent">
      <div class="box"></div>
      <div class="box"></div>
      <div class="box"></div>
    </div>
  </body>
</html>
