<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>회원가입</title>
</head>
<body>
    <fieldset style="width: 500px;">
        <legend>회원가입</legend>
        <table>
            <tr>
                <td align="right"><label for="userId">사용자 ID</label></td>
                <td><input type="text" id="userId" name="userId"></td>
            </tr>
            <tr>
                <td align="right"><label for="pw">비밀번호</label></td>
                <td><input type="password" id="pw" name="pw"></td>
            </tr>
            <tr>
                <td align="right"><label for="pwCheck">비밀번호 확인</label></td>
                <td><input type="password" id="pwCheck" name="pwCheck"></td>
            </tr>
            <tr>
                <td align="right"><label for="name">이름</label></td>
                <td><input type="text" id="name" name="name"></td>
            </tr>
            <tr>
                <td align="right">성별</td>
                <td>
                    <input type="radio" id="male" name="gender" value="male">
                    <label for="male">남</label>
                    <input type="radio" id="female" name="gender" value="female">
                    <label for="female">여</label>
                </td>
            </tr>
            <tr>
                <td align="right">취미</td>
                <td>
                    <input type="checkbox" id="soccer" name="hobby" value="soccer">
                    <label for="soccer">축구</label>
                    <input type="checkbox" id="baseball" name="hobby" value="baseball">
                    <label for="baseball">야구</label>
                    <input type="checkbox" id="volleyball" name="hobby" value="volleyball">
                    <label for="volleyball">배구</label>
                    <input type="checkbox" id="basketball" name="hobby" value="basketball">
                    <label for="basketball">농구</label>
                </td>
            </tr>
            <tr>
                <td align="right"><label for="email">email</label></td>
                <td><input type="email" id="email" name="email"></td>
            </tr>
            <tr>
                <td align="right"><label for="role">역할</label></td>
                <td>
                    <select id="role" name="role">
                        <option value="admin">ADMIN</option>
                        <option value="manager" selected>관리자</option>
                        <option value="user">일반회원</option>
                    </select>
                </td>
            </tr>
            <tr>
                <td colspan="2">
                    <button type="submit">확인</button>
                    <button type="reset">다시쓰기</button>
                </td>
            </tr>
        </table>
    </fieldset>
</body>
</html>
